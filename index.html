<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colonist-Style AI Arena</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Colonist-Style AI Arena</h1>
      <p class="subtitle">A Catan-inspired simulation with stronger strategic AI.</p>
    </header>

    <main>
      <section class="board-panel">
        <canvas id="board" width="980" height="700" aria-label="Game board"></canvas>
      </section>

      <aside class="sidebar">
        <section class="controls">
          <h2>Controls</h2>
          <div class="button-row">
            <button id="nextTurnBtn">Next Turn</button>
            <button id="autoplayBtn">Start Autoplay</button>
            <button id="resetBtn">Reset Game</button>
          </div>
          <label for="speedRange">Autoplay Speed</label>
          <input id="speedRange" type="range" min="150" max="2000" step="50" value="700" />
          <div id="statusText" class="status"></div>
        </section>

        <section>
          <h2>Scoreboard</h2>
          <div id="scoreboard"></div>
        </section>

        <section>
          <h2>Event Log</h2>
          <div id="log" class="log"></div>
        </section>
      </aside>
    </main>

    <footer>
      <small>
        Rules are intentionally streamlined, but the AI plans roads, trades, and upgrades using
        expected-value scoring.
      </small>
    </footer>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
