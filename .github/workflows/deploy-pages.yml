name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
      - cursor/colonist-game-ai-351c
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whether Pages is enabled
        id: pages_status
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput("enabled", "true");
              core.notice("GitHub Pages is already enabled.");
            } catch (error) {
              core.setOutput("enabled", "false");
              core.warning("GitHub Pages is not enabled yet. Enable it in Settings -> Pages (source: GitHub Actions).");
            }

      - name: Setup Pages
        uses: actions/configure-pages@v5
        if: steps.pages_status.outputs.enabled == 'true'

      - name: Build static bundle
        if: steps.pages_status.outputs.enabled == 'true'
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html styles.css _site/
          cp -R src assets _site/

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        if: steps.pages_status.outputs.enabled == 'true'
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: steps.pages_status.outputs.enabled == 'true'

      - name: Pages not enabled notice
        if: steps.pages_status.outputs.enabled != 'true'
        run: |
          echo "GitHub Pages is not enabled for this repository."
          echo "Go to Settings -> Pages, choose source: GitHub Actions, then rerun this workflow."
