name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: tripminddemoacr
  IMAGE_NAME: tripplanner
  RESOURCE_GROUP: tripmind-demo-rg
  CONTAINER_APP: tripmind-demo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Prefer OIDC (no client secret in GitHub). Set AZURE_CLIENT_ID, AZURE_TENANT_ID,
      # AZURE_SUBSCRIPTION_ID and add a federated credential on the app for this repo.
      - name: Log in to Azure (OIDC)
        if: ${{ secrets.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Fallback: single JSON secret from `az ad sp create-for-rbac` (camelCase keys).
      - name: Log in to Azure (service principal secret)
        if: ${{ secrets.AZURE_CLIENT_ID == '' }}
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push image
        run: |
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
                        -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest .
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
